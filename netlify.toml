[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/functions/*.ts"]
  excluded_patterns = ["netlify/functions/*.test.ts", "netlify/functions/*.spec.ts"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
